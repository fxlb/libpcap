language: c

os:
  - linux
  - osx

dist: focal

cache: ccache

git:
  quiet: true
  depth: 3

before_install:
  - uname -a
  - date

install:

before_script:
  - ./configure
  - ls -l scanner.h grammar.h grammar.c scanner.c
  - make clean
  - ls -l scanner.h grammar.h grammar.c scanner.c

script:
  - make
  - ls -l scanner.h grammar.h grammar.c scanner.c
  - if [ "$TRAVIS_OS_NAME" = osx ]; then sleep 10; fi
